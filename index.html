<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
    height:100vh;
}

.header{

    padding:15px;

    font-size:24px;
    font-weight:bold;
}

.container{
    width:100%;
    height:calc(100vh - 60px);
}

iframe{
    width:100%;
    height:100%;
    border:none;
    background:#fff;
}
</style>
</head>

<body>

<div class="header">
    Admin Dashboard
</div>

<div class="container">
    <iframe
        src="https://script.google.com/macros/s/AKfycbysPveoyUZTFlIYAjHbBNbdvNaAApzCaQJZrYdkurLJs77_iQQ-wpApTXKjxv_KiTlt/exec"
        allowfullscreen>
    </iframe>
</div>

</body>
</html>
